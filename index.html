<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PearlAI | Intelligence Evolved</title>
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8faff; color: #1e293b; }
        
        /* Pearl Glow Effect (Gemini/OpenAI Fusion) */
        .pearl-gradient {
            background: radial-gradient(circle at top center, rgba(99, 102, 241, 0.08) 0%, transparent 60%);
        }
        
        .pearl-logo {
            background: linear-gradient(135deg, #2563eb 0%, #9333ea 50%, #db2777 100%);
            box-shadow: 0 0 20px rgba(147, 51, 234, 0.3);
            animation: pulse-glow 3s infinite;
        }

        @keyframes pulse-glow {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.9; transform: scale(1.05); }
        }

        /* Custom scrollbar (Claude/DeepSeek Style) */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }

        /* Input Glassmorphism */
        .glass-input {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 0, 0, 0.08);
        }

        .message-user {
            background: #e6f7ff; /* Light blue */
            border: 1px solid rgba(0, 0, 0, 0.05); 
        }
        
        /* Markdown Styling Overrides */
        .prose pre {
            background-color: #1e293b !important;
            color: #f8fafc !important;
            border-radius: 0.75rem !important;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .prose code {
            font-weight: 600 !important;
        }

        .colorful-pearl {
            background: linear-gradient(to right, #2563eb, #9333ea, #db2777);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
    </style>
</head>
<body class="h-screen flex overflow-hidden">

    <!-- Sidebar Overlay (Mobile Only) -->
    <div id="sidebar-overlay" class="fixed inset-0 bg-slate-900/20 backdrop-blur-sm z-40 hidden md:hidden"></div>

    <!-- Sidebar -->
    <aside id="sidebar" class="fixed inset-y-0 left-0 z-50 w-64 bg-white transform -translate-x-full md:relative md:translate-x-0 transition-transform duration-300 ease-in-out flex flex-col border-r border-slate-200/60">
        <div class="p-4">
            <button id="new-chat-btn" class="w-full flex items-center gap-3 px-3 py-2.5 bg-indigo-50 hover:bg-indigo-100 rounded-xl border border-indigo-200 transition-all group">
                <i data-lucide="plus" class="w-4 h-4 text-indigo-600"></i>
                <span class="text-sm font-medium text-indigo-700">New Chat</span>
            </button>
            <button id="clear-chat-btn" class="w-full flex items-center gap-3 px-3 py-2.5 mt-2 text-red-400 hover:text-red-600 hover:bg-red-50 rounded-xl transition-all group">
                <i data-lucide="trash-2" class="w-4 h-4 text-red-500"></i>
                <span class="text-sm font-medium text-red-500">Clear Chat</span>
            </button>
        </div>
        
        <div class="flex-1 overflow-y-auto px-3 space-y-1 mt-4">
            <p class="text-[10px] font-bold text-slate-400 uppercase px-3 mb-2 tracking-widest">Recent Chats</p>
            <div id="recent-chats-list" class="space-y-1">
                <div class="px-3 py-2 text-xs text-slate-400 italic">No history yet...</div>
            </div>
        </div>

        <div class="p-4 mt-auto border-t border-slate-100">
            <div class="flex items-center gap-3 px-3 py-2 hover:bg-slate-50 rounded-lg cursor-pointer transition-colors">
                <div class="w-8 h-8 rounded-full bg-gradient-to-tr from-indigo-500 to-purple-500 flex items-center justify-center text-[10px] font-bold">JD</div>
                <div class="flex-1 overflow-hidden">
                    <p class="text-[10px] text-slate-500 uppercase">Pro Member</p>
                </div>
                <i data-lucide="settings" class="w-4 h-4 text-slate-400"></i>
            </div>
        </div>
    </aside>

    <!-- Main View (Gemini/Claude Mix) -->
    <main class="flex-1 flex flex-col relative pearl-gradient">
        
        <!-- Header -->
        <header class="h-16 flex items-center justify-between px-4 md:px-8 z-10 border-b border-slate-100 md:border-none">
            <div class="flex items-center gap-3">
                <button id="mobile-menu-btn" class="p-2 -ml-2 hover:bg-slate-100 rounded-lg md:hidden">
                    <i data-lucide="menu" class="w-5 h-5 text-slate-600"></i>
                </button>
                <div class="w-7 h-7 pearl-logo rounded-full"></div>
                <h1 class="text-xl font-bold tracking-tight colorful-pearl">PearlAI</h1>
            </div>
            <div class="flex items-center gap-4 bg-slate-100 p-1.5 px-4 rounded-full border border-slate-200/50">
                <div class="flex items-center gap-2">
                    <div class="w-2 h-2 bg-emerald-500 rounded-full"></div>
                    <span class="text-[10px] font-bold text-slate-500 uppercase tracking-tight">System Online</span>
                </div>
                <button class="hidden sm:block px-4 py-1 text-xs font-medium rounded-full text-slate-500 hover:text-slate-800 transition-colors border-l border-slate-200 pl-4">Pro</button>
            </div>
        </header>

        <!-- Chat Container -->
        <div id="chat-container" class="flex-1 overflow-y-auto py-8">
            <div class="max-w-3xl mx-auto px-6 space-y-10">
                <!-- Assistant Welcome -->
                <div class="flex gap-6 animate-fade-in">
                    <div class="w-8 h-8 rounded-full border border-slate-200 flex items-center justify-center bg-white shrink-0 shadow-sm">
                        <i data-lucide="sparkles" class="w-4 h-4 text-indigo-600"></i>
                    </div>
                    <div class="space-y-4 flex-1 relative group/msg">
                        <div class="prose prose-slate text-[15px] leading-relaxed text-slate-700">
                            Welcome to PearlAI. I’ve been synthesized from the world’s most advanced models to help you create, code, and think. How can we begin today?
                        </div>
                        <button class="copy-btn absolute -top-2 right-0 p-1.5 opacity-0 group-hover/msg:opacity-100 hover:bg-slate-100 rounded-lg transition-all text-slate-400 hover:text-indigo-600" title="Copy response">
                            <i data-lucide="copy" class="w-4 h-4"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Input Area (DeepSeek/Gemini Influence) -->
        <div class="p-4 md:p-10">
            <div class="max-w-3xl mx-auto">
                <div class="glass-input rounded-[24px] p-2 focus-within:ring-2 ring-indigo-500/20 transition-all shadow-xl shadow-slate-200/50">
                    <textarea 
                        id="user-input"
                        rows="1" 
                        placeholder="Message PearlAI..." 
                        class="w-full bg-transparent border-none focus:ring-0 text-slate-800 placeholder-slate-400 py-4 px-6 resize-none outline-none leading-relaxed"
                    ></textarea>
                    
                    <div class="flex items-center justify-between px-3 pb-2 pt-1">
                        <div class="flex gap-1">
                            <button class="p-2.5 hover:bg-slate-100 rounded-xl text-slate-500 transition-colors">
                                <i data-lucide="paperclip" class="w-5 h-5"></i>
                            </button>
                            <button class="hidden sm:flex p-2.5 hover:bg-slate-100 rounded-xl text-slate-500 transition-colors">
                                <i data-lucide="globe" class="w-5 h-5"></i>
                            </button>
                            <button class="hidden sm:flex p-2.5 hover:bg-slate-100 rounded-xl text-slate-500 transition-colors">
                                <i data-lucide="image" class="w-5 h-5"></i>
                            </button>
                            <button id="mic-btn" class="p-2.5 hover:bg-slate-100 rounded-xl text-slate-500 transition-colors" title="Voice Input">
                                <i data-lucide="mic" class="w-5 h-5"></i>
                            </button>
                        </div>
                        <button id="send-btn" class="bg-slate-900 text-white p-2.5 rounded-xl hover:bg-slate-800 transition-all flex items-center justify-center">
                            <i data-lucide="arrow-up" class="w-5 h-5"></i>
                        </button>
                    </div>
                </div>
                <p class="text-center text-[10px] text-slate-400 mt-4 tracking-wider uppercase font-medium">
                    PearlAI can make mistakes, use with caution.
                </p>
            </div>
        </div>
    </main>

    <script src="/static/script.js"></script>
</body>
</html>
